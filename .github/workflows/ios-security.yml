name: iOS Security Checks

on:
  pull_request:
    paths:
      - 'src/**'
      - 'public/**'
      - 'playwright/**'
      - 'scripts/**'
      - 'tools/**'
      - 'Makefile'
      - 'playwright.config.ts'
      - 'vite.config.ts'
      - 'xcodeproj/**'
      - 'KeriWalletTests/**'
      - 'KeriWalletUITests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'bridge-contract.json'
      - '.github/workflows/ios-security.yml'
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'playwright/**'
      - 'scripts/**'
      - 'tools/**'
      - 'Makefile'
      - 'playwright.config.ts'
      - 'vite.config.ts'
      - 'xcodeproj/**'
      - 'KeriWalletTests/**'
      - 'KeriWalletUITests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'bridge-contract.json'
      - '.github/workflows/ios-security.yml'
  workflow_dispatch:

jobs:
  payload-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify bridge contract output
        run: npm run bridge:check

      - name: Run TypeScript checks
        run: npm run typecheck

      - name: Run TypeScript unit tests
        run: make test-ts

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run fast Playwright smoke tests
        run: make test-e2e

      - name: Scan for secrets
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            git --no-banner --redact --exit-code 1 .

  swift-tests:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Swift unit and UI tests
        run: make test-swift SIMULATOR_NAME='iPhone 16' SIMULATOR_OS=latest