name: iOS Slow Pyodide Checks

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * *'

jobs:
  pyodide-roundtrip:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Stage committed WebPayload snapshot
        run: |
          test -f WebPayload/index.html
          test -f WebPayload/python/hio-manifest.json
          test -f WebPayload/python/locksmith-manifest.json
          rm -rf dist
          mkdir -p dist
          cp -R WebPayload/. dist/

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run slow Pyodide roundtrip
        run: npx playwright test --grep "@slow"