<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="dark light" />
  <title>KERI Wallet</title>
  <style>
    :root {
      --keri-green: #61783e;
      --bg-dark: #0d0d0f;
      --bg-light: #f5f5f7;
      --text-dark: #e8e8e8;
      --text-light: #1d1d1f;
      --text-muted-dark: #a0a0a8;
      --text-muted-light: #6e6e73;
      --status-pending: #ff9f0a;
      --status-error: #ff453a;
      --status-done: var(--keri-green);
      --space-sm: 12px;
      --space-md: 16px;
      --space-lg: 24px;
      --fade-duration: 0.4s;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      color-scheme: dark light;
      -webkit-font-smoothing: antialiased;
      height: 100dvh;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-dark);
      min-height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      line-height: 1.5;
      padding:
        max(var(--space-md), env(safe-area-inset-top))
        max(var(--space-md), env(safe-area-inset-right))
        max(var(--space-md), env(safe-area-inset-bottom))
        max(var(--space-md), env(safe-area-inset-left));
    }

    @media (prefers-color-scheme: light) {
      body {
        background-color: var(--bg-light);
        color: var(--text-light);
      }
    }

    #loading {
      display: flex;
      min-height: 80dvh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-lg);
      transition: opacity var(--fade-duration) ease-out;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading img {
      width: 80px;
      height: 80px;
      animation: pulse 2s ease-in-out infinite;
    }

    #loading-status,
    #status,
    .copy {
      color: var(--text-muted-dark);
    }

    @media (prefers-color-scheme: light) {
      #loading-status,
      #status,
      .copy {
        color: var(--text-muted-light);
      }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.96); }
    }

    #app {
      display: none;
      max-width: 720px;
      margin: 0 auto;
    }

    #app.visible {
      display: block;
    }

    .header {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-bottom: var(--space-lg);
      padding-bottom: var(--space-md);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    @media (prefers-color-scheme: light) {
      .header {
        border-bottom-color: rgba(0, 0, 0, 0.08);
      }
    }

    .header img {
      height: 32px;
      width: auto;
    }

    .header h1 {
      color: var(--keri-green);
      font-size: 20px;
      font-weight: 700;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: var(--space-md);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--status-pending);
      flex-shrink: 0;
    }

    .status-dot.done {
      background-color: var(--status-done);
    }

    .status-dot.error {
      background-color: var(--status-error);
    }

    .copy {
      margin-bottom: var(--space-lg);
      font-size: 14px;
    }

    #output {
      padding: var(--space-md);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background-color: rgba(255, 255, 255, 0.05);
      font-family: ui-monospace, "SF Mono", "Fira Code", monospace;
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 180px;
      max-height: 40dvh;
      overflow-y: auto;
    }

    @media (prefers-color-scheme: light) {
      #output {
        border-color: rgba(0, 0, 0, 0.06);
        background-color: rgba(0, 0, 0, 0.03);
      }
    }
  </style>
  <script type="module" src="/src/main.ts"></script>
</head>
<body>
  <div id="loading">
    <img src="./SymbolLogo.svg" alt="KERI" />
    <span id="loading-status">Initializing validation runtime…</span>
  </div>

  <div id="app">
    <div class="header">
      <img src="./FullLogo.svg" alt="KERI Foundation" />
      <h1>Validation Harness</h1>
    </div>
    <div class="status-row">
      <span class="status-dot" id="status-dot"></span>
      <span id="status">booting validation checks</span>
    </div>
    <p class="copy">
      This browser-only surface validates the local bridge and worker runtime. The shipped iOS
      wrapper serves the FortWeb product-shell payload staged into <code>WebPayload/</code>.
    </p>
    <pre id="output"></pre>
  </div>
</body>
</html>
